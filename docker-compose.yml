services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - API_KEY=${API_KEY:-dev-api-key}
      - FMCSA_API_KEY=${FMCSA_API_KEY:-}
      - DATABASE_URL=${DATABASE_URL:-sqlite:///./calls.db}
    volumes:
      # Persist SQLite DB across container restarts
      - backend_data:/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
      args:
        - VITE_API_KEY=${API_KEY:-dev-api-key}
        - VITE_API_URL=http://localhost:8000
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  backend_data:
